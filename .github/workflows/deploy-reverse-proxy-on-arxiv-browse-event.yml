name: Trigger reverse proxy GCP deployments when arxiv-browse updates

on:
  repository_dispatch:
    types: [arxiv-browse-updated]

jobs:
  resolve-environment:
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.set-env.outputs.environment }}
    steps:
      - name: Set target environment
        id: set-env
        run: |
          if [[ "${{ github.event.client_payload.branch }}" == "master" ]]; then
            echo "environment=production" >> $GITHUB_OUTPUT
          elif [[ "${{ github.event.client_payload.branch }}" == "develop" ]]; then
            echo "environment=development" >> $GITHUB_OUTPUT
          else
            echo "No matching environment for branch ${{ github.event.client_payload.branch }}"
            exit 1
          fi

  run-the-reverse-proxy-build-trigger:
    needs: resolve-environment
    runs-on: ubuntu-latest
    environment: ${{ needs.resolve-environment.outputs.environment }}
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Wait for arxiv-browse push to propagate (upto 30s)
        env:
          EXPECTED_SHA: ${{ github.event.client_payload.sha }}
          BRANCH: ${{ github.event.client_payload.branch }}
        run: |
          for attempt in $(seq 1 15); do
            REMOTE_SHA=$(git ls-remote https://github.com/arXiv/arxiv-browse.git refs/heads/$BRANCH | cut -f1)
            [ "$REMOTE_SHA" = "$EXPECTED_SHA" ] && echo "Branch is current" && exit 0
            echo "Attempt $attempt: branch at $REMOTE_SHA, waiting for $EXPECTED_SHA..."
            sleep 2
          done
          echo "Timed out waiting for branch to update, will run trigger anyway."

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.PROVIDER_NAME }}
          service_account: ${{ vars.SERVICE_ACCOUNT }}

      - name: Run the reverse proxy build trigger in environment ${{ needs.resolve-environment.outputs.environment }}
        run: |
          gcloud builds triggers run ${{ vars.TRIGGER_ID_SUBMIT_REVERSE_PROXY }} \
            --project=${{ vars.PROJECT_NAME }} \
            --branch=${{ vars.TRIGGER_BRANCH }}