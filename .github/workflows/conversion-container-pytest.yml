# This workflow will install Python dependencies and run tests with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Conversion-container pytests

on:
  push:
    branches: ["gcp-cd-arxiv-development"]
  pull_request:
    branches: ["gcp-cd-arxiv-development"]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      LATEXML_COMMIT: "5e47b3b13a386826581a31464083086520ca2817"
    steps:
      - name: Install a recent LaTeXML
        run: |
          eval $(perl -I$HOME/perl5/lib -Mlocal::lib)
          echo 'eval "$(perl -I$HOME/perl5/lib/perl5 -Mlocal::lib)"' >> ~/.bashrc
          cpanm --notest --verbose https://github.com/brucemiller/LaTeXML/tarball/$LATEXML_COMMIT

      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v3
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install poetry
          cd conversion-container
          poetry install --all-extras
      - name: Test with pytest
        run: |
          cd conversion-container
          poetry run pytest
